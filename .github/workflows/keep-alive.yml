name: Keep Render Alive

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" ${{ secrets.RENDER_URL }}/health)
          echo "Status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Service non disponible (status $STATUS) — réveil en cours..."
            exit 1
          fi
          echo "Service actif."
